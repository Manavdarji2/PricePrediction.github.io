name: CI – Test Streamlit App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Streamlit app imports
        run: |
          python -c "
          import streamlit
          import pickle
          import numpy as np
          import math
          import pandas as pd
          print('All imports OK')
          "

      - name: Check model file exists
        run: |
          python -c "
          import os, sys
          if not os.path.exists('Mumbai-price-pridection.pickle'):
              print('WARNING: Model pickle file not found.')
              sys.exit(1)
          print('Model file found.')
          "

      - name: Smoke-test prediction logic
        run: |
          python -c "
          import app
          model = app.load_model()
          price = app.predict_price(model, 'Andheri', 15000, 2, 700)
          print(f'Prediction for Andheri 2BHK 700sqft @ 15000/sqft: {price:.4f} Cr')
          assert price > 0, 'Price should be positive'
          print('Smoke test passed.')
          "
